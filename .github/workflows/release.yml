name: Create & Release PDFs

on:
  push:
    branches:
      - main

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  release:
    name: render and release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: setup nodejs
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: install node deps
        run: npm ci

      - name: compute release version
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Ask semantic-release what the next version will be (no publish).
          VERSION=$(npx semantic-release --dry-run 2>&1 \
            | grep -ioE 'next release version is [0-9]+\.[0-9]+\.[0-9]+' \
            | grep -oE '[0-9]+\.[0-9]+\.[0-9]+' | head -n1 || true)
          # Fallback: latest existing tag (no new release this run).
          if [ -z "$VERSION" ]; then
            VERSION=$(git describe --tags --abbrev=0 2>/dev/null | sed 's/^v//')
          fi
          [ -z "$VERSION" ] && VERSION="0.0.0"
          echo "RESUME_VERSION=$VERSION" >> "$GITHUB_ENV"
          echo "Resume version for this build: v$VERSION"

      - name: install weasyprint and dependencies
        run: |
          sudo apt-get update -qq
           sudo apt-get install -y -qq \
           libpango-1.0-0 \
           libpangoft2-1.0-0 \
           libpangocairo-1.0-0 \
           libgdk-pixbuf2.0-0 \
           libffi-dev \
           shared-mime-info
          pip install weasyprint

      - name: create dist directory
        run: mkdir -pv dist

      # Inject the footer version + tag link into the render stream only
      # (resume.html on disk stays unmodified, so semantic-release sees a
      # clean working tree).
      - name: render light pdf
        run: |
          sed -e 's/class="dark"/class="light"/' \
              -e "s#<span class=\"footer-ver\"></span>#<span class=\"footer-ver\"> v${RESUME_VERSION}</span>#" \
              -e "s#resume/releases\"#resume/releases/tag/v${RESUME_VERSION}\"#" \
              resume.html \
            | weasyprint - dist/resume-light.pdf

      - name: render dark pdf
        run: |
          sed -e 's/class="light"/class="dark"/' \
              -e "s#<span class=\"footer-ver\"></span>#<span class=\"footer-ver\"> v${RESUME_VERSION}</span>#" \
              -e "s#resume/releases\"#resume/releases/tag/v${RESUME_VERSION}\"#" \
              resume.html \
            | weasyprint - dist/resume-dark.pdf

      - name: run semantic-release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npx semantic-release
